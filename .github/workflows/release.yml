name: Release (SemVer)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump type"
        required: true
        type: choice
        default: patch
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch is main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow only supports releases from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Configure Git identity
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Compute next versions
        id: version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n1)"
          BASE_VERSION="${CURRENT_VERSION%-SNAPSHOT}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          case "${{ github.event.inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Invalid bump type: ${{ github.event.inputs.bump }}"
              exit 1
              ;;
          esac

          RELEASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEXT_DEV_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "next_dev=$NEXT_DEV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set release version in all Maven modules
        run: |
          mvn -B versions:set \
            -DnewVersion="${{ steps.version.outputs.release }}" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false
          mvn -B versions:commit

      - name: Commit release version and tag
        run: |
          git add -A
          git commit -m "chore(release): v${{ steps.version.outputs.release }}"
          git tag "v${{ steps.version.outputs.release }}"
          git push origin HEAD --follow-tags

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release }}
          generate_release_notes: true

      - name: Set next development version
        run: |
          mvn -B versions:set \
            -DnewVersion="${{ steps.version.outputs.next_dev }}" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false
          mvn -B versions:commit

      - name: Commit next development version
        run: |
          git add -A
          git commit -m "chore: prepare next development iteration (${{ steps.version.outputs.next_dev }})"
          git push origin HEAD
